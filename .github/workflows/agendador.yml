name: Robô de Vagas Executivas

on:
  schedule:
    # Roda todo dia às 6h da manhã (horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  buscar-vagas:
    runs-on: ubuntu-latest
    
    steps:
    - name: Pegar o código do robô
      uses: actions/checkout@v4  # ← mudei de v3 para v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5  # ← mudei de v4 para v5
      with:
        python-version: '3.12'  # ← versão mais nova
        
    - name: Instalar bibliotecas necessárias
      run: |
        pip install requests
        pip install beautifulsoup4
        
    - name: Executar o robô
      run: python robo.py
