name: Robô de Vagas Executivas

on:
  schedule:
    # Isso roda todo dia às 6h da manhã (horário de Brasília)
    - cron: '0 9 * * *'  # 9h UTC = 6h BRT
  workflow_dispatch:  # permite rodar manualmente

jobs:
  buscar-vagas:
    runs-on: ubuntu-latest
    
    steps:
    - name: Pegar o código do robô
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Instalar bibliotecas necessárias
      run: |
        pip install requests
        pip install beautifulsoup4
        
    - name: Executar o robô
      run: python robo.py
